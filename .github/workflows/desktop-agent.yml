name: JARVIS Desktop Agent CI

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-agent.yml"
      - "desktop-agent/**"
      - "shared/**"
      - "lib/desktop-agent/**"
      - "lib/prompts/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop-agent.yml"
      - "desktop-agent/**"
      - "shared/**"
      - "lib/desktop-agent/**"
      - "lib/prompts/**"

jobs:
  desktop-agent-python:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: desktop-agent/requirements.txt

      - name: Install System Dependencies
        run: brew install portaudio

      - name: Set up Virtualenv and Install Packages
        run: |
          cd desktop-agent
          make setup
        env:
          MISTRAL_API_KEY: ci-placeholder-key
          GEMINI_API_KEY: ci-placeholder-key
          OPENROUTER_API_KEY: ci-placeholder-key

      - name: Run Pytest Test Suite
        run: |
          cd desktop-agent
          make test

  web-bridge-typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Run Vitest Test Suite (Desktop Bridge)
        run: pnpm vitest run lib/desktop-agent lib/prompts lib/speech-recognition