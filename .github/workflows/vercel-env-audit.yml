name: Vercel env audit

on:
  schedule:
    # 1st day of month, 09:00 UTC — periodic ops check
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run Vercel environment audit
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          JARVIS_AUDIT_BASE_URL: https://jarvis-ten-omega.vercel.app
        run: pnpm audit:vercel-env

      - name: Upload audit artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-env-audit-log
          path: |
            lib/ops/
            scripts/audit-vercel-env.ts